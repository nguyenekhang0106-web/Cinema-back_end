server:
  address: 0.0.0.0
  port: ${PORT:9090}
  servlet:
    context-path: /cinema

spring:
  config:
    import: optional:file:.env.properties

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST:/}
    ssl:
      enabled: ${RABBITMQ_SSL_ENABLED:false}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        auto-startup: ${RABBITMQ_AUTO_STARTUP:true}
        acknowledge-mode: manual
        default-requeue-rejected: false
      direct:
        auto-startup: ${RABBITMQ_AUTO_STARTUP:true}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      format_sql: true
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

jwt:
  signerKey: ${JWT_SIGNER_KEY}
  valid-duration: ${JWT_VALID_DURATION:3600}
  refreshable-duration: ${JWT_REFRESHABLE_DURATION:86400}

app:
  email-verification-ttl-minutes: ${EMAIL_VERIFICATION_TTL_MINUTES:15}
  rabbitmq:
    booking-paid-exchange: cinema.booking.exchange
    booking-paid-queue: cinema.booking.paid.queue
    booking-paid-routing-key: cinema.booking.paid
    booking-paid-retry-exchange: cinema.booking.retry.exchange
    booking-paid-retry-queue: cinema.booking.paid.retry.queue
    booking-paid-retry-routing-key: cinema.booking.paid.retry
    booking-paid-retry-delay-ms: 10000
    booking-paid-dlx: cinema.booking.dlx
    booking-paid-dlq: cinema.booking.paid.dlq
    booking-paid-dlq-routing-key: cinema.booking.paid.dlq
    booking-paid-max-retry: 5
    email-exchange: cinema.email.exchange
    email-queue: cinema.email.queue
    email-routing-key: cinema.email.notification
    email-retry-exchange: cinema.email.retry.exchange
    email-retry-queue: cinema.email.retry.queue
    email-retry-routing-key: cinema.email.retry
    email-retry-delay-ms: 30000
    email-dlx: cinema.email.dlx
    email-dlq: cinema.email.dlq
    email-dlq-routing-key: cinema.email.dlq
    email-max-retry: 5

payment:
  vnpay:
    pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
    tmn-code: ${VNPAY_TMN_CODE}
    hash-secret: ${VNPAY_HASH_SECRET}
    return-url: ${VNPAY_RETURN_URL}
    version: "2.1.0"
    command: pay
    order-type: other

mail:
  host: ${MAIL_HOST:smtp.gmail.com}
  port: ${MAIL_PORT:587}
  username: ${MAIL_USERNAME}
  password: ${MAIL_PASSWORD}
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region:
      static: ${AWS_REGION:ap-southeast-2}

aws:
  bucket:
    name: ${AWS_BUCKET_NAME}