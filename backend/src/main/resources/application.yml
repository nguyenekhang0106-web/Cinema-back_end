server:
  port: 9090
  servlet:
    context-path: /cinema

spring:
  config:
    import: optional:file:.env.properties

  # 🔥 BỔ SUNG CẤU HÌNH UPLOAD FILE (Nâng mức trần lên 5MB cho khớp với S3Service)
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  data:
    redis:
      host: localhost
      port: 6379
      # password: # bật nếu Redis có mật khẩu

  datasource:
    # Tham số createDatabaseIfNotExist=true sẽ ra lệnh cho MySQL tự tạo database nếu nó chưa tồn tại
    url: "jdbc:mysql://localhost:3308/cinema_db?createDatabaseIfNotExist=true"
    username: root
    password: root

  jpa:
    hibernate:
      format_sql: true
      ddl-auto: update
      #ddl-auto: create # dùng khi cần xóa trắng và tạo lại bảng từ đầu
    show-sql: true

jwt:
  signerKey: "03c932a1642650fff48b9a8011929cfae0e31a62c4b23b23e9c062dbe3cad3c3"
  valid-duration: 3600 # in seconds
  refreshable-duration: 86400 # in seconds

app:
  # TTL mã 6 số xác thực email (lưu trong Redis, key prefix cinema:email-verify:)
  email-verification-ttl-minutes: 15

mail:
  host: smtp.gmail.com
  port: 587
  username: bacdoandanh@gmail.com
  password: ledwpisqwjsrvmwb # KHÔNG phải mật khẩu đăng nhập Gmail đâu nhé!
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region:
      static: ap-southeast-2

aws:
  bucket:
    name: cinemapbl3