server:
  port: 9090
  servlet:
    context-path: /cinema

spring:
  config:
    import: optional:file:.env.properties

  # 🔥 BỔ SUNG CẤU HÌNH UPLOAD FILE (Nâng mức trần lên 5MB cho khớp với S3Service)
  servlet:
    multipart:
      max-file-size: 20MB      # Nâng lên 20MB
      max-request-size: 20MB   # Nâng lên 20MB

  data:
    redis:
      host: localhost
      port: 6379
      # password: # bật nếu Redis có mật khẩu

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        default-requeue-rejected: false

  datasource:
    # Tham số createDatabaseIfNotExist=true sẽ ra lệnh cho MySQL tự tạo database nếu nó chưa tồn tại
    url: "jdbc:mysql://localhost:3308/cinema_db?createDatabaseIfNotExist=true"
    username: root
    password: root

  jpa:
    hibernate:
      format_sql: true
      ddl-auto: update
      #ddl-auto: create # dùng khi cần xóa trắng và tạo lại bảng từ đầu
    show-sql: true

jwt:
  signerKey: "03c932a1642650fff48b9a8011929cfae0e31a62c4b23b23e9c062dbe3cad3c3"
  valid-duration: 3600 # in seconds
  refreshable-duration: 86400 # in seconds

app:
  # TTL mã 6 số xác thực email (lưu trong Redis, key prefix cinema:email-verify:)
  email-verification-ttl-minutes: 15
  rabbitmq:
    booking-paid-exchange: cinema.booking.exchange
    booking-paid-queue: cinema.booking.paid.queue
    booking-paid-routing-key: cinema.booking.paid
    booking-paid-retry-exchange: cinema.booking.retry.exchange
    booking-paid-retry-queue: cinema.booking.paid.retry.queue
    booking-paid-retry-routing-key: cinema.booking.paid.retry
    booking-paid-retry-delay-ms: 10000
    booking-paid-dlx: cinema.booking.dlx
    booking-paid-dlq: cinema.booking.paid.dlq
    booking-paid-dlq-routing-key: cinema.booking.paid.dlq
    booking-paid-max-retry: 5
    email-exchange: cinema.email.exchange
    email-queue: cinema.email.queue
    email-routing-key: cinema.email.notification
    email-retry-exchange: cinema.email.retry.exchange
    email-retry-queue: cinema.email.retry.queue
    email-retry-routing-key: cinema.email.retry
    email-retry-delay-ms: 30000
    email-dlx: cinema.email.dlx
    email-dlq: cinema.email.dlq
    email-dlq-routing-key: cinema.email.dlq
    email-max-retry: 5

